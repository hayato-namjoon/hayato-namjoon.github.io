<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>製品カタログ選択 - Sales Intelligence</title>
    <style>
        :root {
            --primary: #1e3799;
            --secondary: #4a69bd;
            --accent: #e55039;
            --dark: #2f3640;
            --light: #f1f2f6;
            --gray: #7f8fa6;
            --white: #ffffff;
        }

        body {
            font-family: 'Helvetica Neue', 'Hiragino Sans', 'Meiryo', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--white);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.5);
            position: relative;
            overflow: hidden;
        }

        /* 上部のアクセントライン */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: var(--secondary);
        }

        .user-icon {
            font-size: 3em;
            margin-bottom: 10px;
            display: inline-block;
        }

        h2 {
            color: var(--primary);
            margin: 0 0 5px 0;
            font-size: 1.5em;
        }

        .subtitle {
            color: var(--gray);
            font-size: 0.9em;
            margin-bottom: 30px;
        }

        /* メニューボタンのスタイル */
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--white);
            color: var(--dark);
            padding: 18px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1em;
            border: 2px solid #e1e5ee;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .btn-icon {
            font-size: 1.2em;
        }

        .btn:hover {
            transform: translateY(-3px);
            border-color: var(--secondary);
            box-shadow: 0 8px 15px rgba(74, 105, 189, 0.1);
            color: var(--primary);
        }

        .btn.estimate {
            background: #fff5f5;
            border-color: #fad3d3;
            color: var(--accent);
        }

        .btn.estimate:hover {
            border-color: var(--accent);
            box-shadow: 0 8px 15px rgba(229, 80, 57, 0.15);
        }

        /* 戻るボタンのスタイル */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--gray);
            text-decoration: none;
            font-size: 0.9em;
            font-weight: bold;
            transition: color 0.2s;
            padding: 10px;
        }

        .back-link:hover {
            color: var(--dark);
        }
    </style>
</head>
<body>

<div class="card">
    <div class="user-icon">👤</div>
    <h2 id="u-name">読み込み中...</h2>
    <div class="subtitle">ご覧になりたいメニューを選択してください</div>
    
    <div class="menu-list">
        <a href="view_site.html" class="btn">
            <span class="btn-icon">📘</span>
            <span>製品カタログ 1</span>
        </a>
        <a href="view_site2.html" class="btn">
            <span class="btn-icon">📙</span>
            <span>製品カタログ 2</span>
        </a>
        <a href="estimate.html" class="btn estimate">
            <span class="btn-icon">💰</span>
            <span>見積作成へ進む</span>
        </a>
    </div>

    <!-- ポータルへ戻るリンク -->
    <a href="index.html" class="back-link">
        <span>🏠</span> ポータルトップへ戻る
    </a>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    
    // ご自身のSupabaseのURLとKEYに変更してください
    const supabaseUrl = 'https://jycqhswoacwoividgozx.supabase.co';
    const supabaseKey = 'sb_publishable_i0inc7RvILsff03SagLiPA_OK_nuxX6';
    const supabase = createClient(supabaseUrl, supabaseKey);

    const viewerId = document.cookie.match(/viewer_uuid=([^;]+)/)?.[1];
    
    if (!viewerId) {
        window.location.href = 'entry.html';
    } else {
        const { data } = await supabase.from('profiles').select('full_name').eq('id', viewerId).single();
        if (!data) {
            window.location.href = 'entry.html';
        } else {
            // 「未登録」の場合は「ゲスト 様」のように表示を調整する処理
            const displayName = data.full_name === '未登録' ? 'ゲスト' : data.full_name;
            document.getElementById('u-name').textContent = `${displayName} 様`;
        }
    }
</script>

</body>
</html>
