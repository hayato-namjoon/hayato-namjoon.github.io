<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ユーザー登録・QRコード発行</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --light: #f4f7f6; --green: #2ecc71; --gray: #95a5a6; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--light); margin: 0; }
        .nav { background: var(--dark); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h3 { margin-top: 0; color: var(--dark); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        /* フォームのスタイル */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85em; color: #666; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1em; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1em; width: 100%; margin-top: 10px; color: white; }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--green); display: none; }
        .btn-clear { background: var(--gray); margin-top: 15px; }

        /* リストのスタイル */
        .search-box { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .user-list { max-height: 600px; overflow-y: auto; }
        .user-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .user-item:hover { background: #f9f9f9; }
        .user-item b { color: var(--primary); font-size: 1.1em; }
        
        /* QRコード表示エリア */
        #qr-result { margin-top: 25px; padding: 20px; background: #f8f9fa; border-radius: 8px; text-align: center; display: none; border: 2px dashed #ccc; }
        #qrcode { display: flex; justify-content: center; margin: 15px 0; }
        .copy-url { background: white; border: 1px solid #ccc; padding: 10px; border-radius: 4px; font-size: 0.85em; word-break: break-all; margin-bottom: 10px; }
        .btn-copy { background: #333; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="nav">
    <h2>👥 ユーザー登録・QRコード発行</h2>
    <a href="admin.html" style="color: white; text-decoration: none; font-weight: bold; background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 4px;">ダッシュボードへ戻る</a>
</div>

<div class="container">
    <div class="card">
        <h3>登録済みユーザーの検索・編集</h3>
        <input type="text" id="search-input" class="search-box" placeholder="会社名や氏名で検索..." oninput="filterList()">
        <div class="user-list" id="user-list">
            <p style="color:#999; text-align:center;">読み込み中...</p>
        </div>
    </div>

    <div class="card">
        <h3 id="form-title">✨ 新規ユーザーの事前登録</h3>
        <input type="hidden" id="edit-id" value="">
        
        <div class="form-group"><label>会社名</label><input type="text" id="f-company" placeholder="例: 株式会社〇〇"></div>
        <div class="form-group"><label>部署名</label><input type="text" id="f-department" placeholder="例: 営業部"></div>
        <div class="form-group"><label>氏名</label><input type="text" id="f-name" placeholder="例: 山田 太郎"></div>
        <div class="form-group"><label>メールアドレス (必須)</label><input type="email" id="f-email" placeholder="例: yamada@example.com"></div>
        <div class="form-group"><label>電話番号</label><input type="tel" id="f-phone" placeholder="例: 090-1234-5678"></div>
        
        <button id="btn-register" class="btn btn-primary" onclick="saveUser()">新規登録してQRコードを発行</button>
        <button id="btn-update" class="btn btn-success" onclick="saveUser()">変更を保存してQRコードを表示</button>
        <button class="btn btn-clear" onclick="clearForm()">選択を解除して新規登録モードに戻る</button>

        <div id="qr-result">
            <strong style="color: var(--dark); font-size: 1.1em;">✅ 専用URLが発行されました！</strong>
            <p style="font-size: 0.85em; color: #666;">このQRコードをスマホ等で読み取ると、情報入力なしでカタログを閲覧できます。</p>
            <div id="qrcode"></div>
            <div class="copy-url" id="magic-url-text">https://...</div>
            <button class="btn-copy" onclick="copyUrl()">URLをクリップボードにコピー</button>
            <p id="copy-msg" style="color: var(--green); font-size: 0.8em; margin-top: 5px; display: none;">コピーしました！</p>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // --- 設定：必ずご自身のプロジェクトの値を入力してください ---
    const SUPABASE_URL = 'https://jycqhswoacwoividgozx.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_i0inc7RvILsff03SagLiPA_OK_nuxX6';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let allUsers = [];

    // 初期化：ユーザー一覧を読み込む
    async function loadUsers() {
        const { data, error } = await supabase.from('profiles').select('*').order('created_at', { ascending: false });
        if (data) {
            allUsers = data;
            renderList(allUsers);
        }
    }

    // リストの描画
    function renderList(users) {
        const list = document.getElementById('user-list');
        if (users.length === 0) {
            list.innerHTML = '<p style="color:#999; text-align:center;">該当するユーザーがいません。</p>';
            return;
        }
        
        list.innerHTML = users.map(u => `
            <div class="user-item" onclick="selectUser('${u.id}')">
                <b>${u.company_name === '未登録' ? '会社未登録' : u.company_name}</b><br>
                <span style="font-size: 0.9em; color: #555;">${u.full_name === '未登録' ? u.email : u.full_name}</span>
            </div>
        `).join('');
    }

    // 検索フィルター
    window.filterList = () => {
        const query = document.getElementById('search-input').value.toLowerCase();
        const filtered = allUsers.filter(u => 
            (u.company_name && u.company_name.toLowerCase().includes(query)) ||
            (u.full_name && u.full_name.toLowerCase().includes(query)) ||
            (u.email && u.email.toLowerCase().includes(query))
        );
        renderList(filtered);
    };

    // ユーザーを選択して編集モードにする
    window.selectUser = (id) => {
        const user = allUsers.find(u => u.id === id);
        if (!user) return;

        document.getElementById('edit-id').value = user.id;
        document.getElementById('f-company').value = user.company_name !== '未登録' ? user.company_name : '';
        document.getElementById('f-department').value = user.department !== '未登録' ? user.department : '';
        document.getElementById('f-name').value = user.full_name !== '未登録' ? user.full_name : '';
        document.getElementById('f-email').value = user.email || '';
        document.getElementById('f-phone').value = user.phone !== '未登録' ? user.phone : '';

        document.getElementById('form-title').innerHTML = "✏️ 既存ユーザーの編集・QR発行";
        document.getElementById('btn-register').style.display = 'none';
        document.getElementById('btn-update').style.display = 'block';
        
        // 選択した瞬間にQRコードも表示する
        generateQR(user.id);
    };

    // フォームをクリアして新規登録モードに戻す
    window.clearForm = () => {
        document.getElementById('edit-id').value = '';
        document.getElementById('f-company').value = '';
        document.getElementById('f-department').value = '';
        document.getElementById('f-name').value = '';
        document.getElementById('f-email').value = '';
        document.getElementById('f-phone').value = '';

        document.getElementById('form-title').innerHTML = "✨ 新規ユーザーの事前登録";
        document.getElementById('btn-register').style.display = 'block';
        document.getElementById('btn-update').style.display = 'none';
        document.getElementById('qr-result').style.display = 'none';
    };

    // 保存処理（新規作成 ＆ 更新）
    window.saveUser = async () => {
        const id = document.getElementById('edit-id').value;
        const email = document.getElementById('f-email').value.trim();
        if (!email) { alert("メールアドレスは必須です！"); return; }

        const profileData = {
            company_name: document.getElementById('f-company').value.trim() || '未登録',
            department: document.getElementById('f-department').value.trim() || '未登録',
            full_name: document.getElementById('f-name').value.trim() || '未登録',
            email: email,
            phone: document.getElementById('f-phone').value.trim() || '未登録',
            is_predicted_company: false 
        };

        let targetId = id;

        if (id) {
            // 更新（Update）
            const { error } = await supabase.from('profiles').update(profileData).eq('id', id);
            if (error) { alert("更新失敗: " + error.message); return; }
        } else {
            // 新規作成（Insert）
            targetId = crypto.randomUUID(); // 新しいIDを発行
            profileData.id = targetId;
            const { error } = await supabase.from('profiles').insert([profileData]);
            if (error) { alert("登録失敗: " + error.message); return; }
            document.getElementById('edit-id').value = targetId; // 編集モードに移行
        }

        await loadUsers(); // リストを更新
        selectUser(targetId); // 保存したユーザーを選択状態にする
        alert("保存しました！専用URLとQRコードを発行します。");
    };

    // QRコードと専用URLの生成
    window.generateQR = (userId) => {
        // 現在のURL（user_manager.html）を基準に、entry.html へのURLを生成
        const baseUrl = window.location.origin + window.location.pathname.replace('user_manager.html', 'entry.html');
        const magicLink = `${baseUrl}?token=${userId}`;

        document.getElementById('magic-url-text').textContent = magicLink;
        document.getElementById('qr-result').style.display = 'block';

        // 古いQRコードを消去して新しく描画
        const qrContainer = document.getElementById('qrcode');
        qrContainer.innerHTML = ''; 
        new QRCode(qrContainer, {
            text: magicLink,
            width: 180,
            height: 180,
            colorDark : "#2c3e50",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    };

    // クリップボードにコピー
    window.copyUrl = () => {
        const text = document.getElementById('magic-url-text').textContent;
        navigator.clipboard.writeText(text).then(() => {
            const msg = document.getElementById('copy-msg');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 2000);
        });
    };

    // 初回読み込み
    loadUsers();
</script>

</body>
</html>
