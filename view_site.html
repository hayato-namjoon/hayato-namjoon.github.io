<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資料閲覧システム</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { margin: 0; background: #525659; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        .toolbar { background: #2c3e50; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 100; }
        .pager, .zoom-controls { display: flex; align-items: center; gap: 15px; }
        button { background: #3498db; border: none; color: white; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:disabled { background: #7f8c8d; }
        .back-btn { background: #95a5a6; }
        #pdf-container { flex-grow: 1; overflow: auto; display: flex; justify-content: center; padding: 20px; }
        canvas { 
            background: white; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            /* もしここに width: 100% や width: 800px があったら削除してください */
        }
    </style>
</head>
<body>

<div class="toolbar">
    <div>
        <button class="back-btn" onclick="location.href='choice_catalog.html'">← 戻る</button>
        <span id="welcome-msg" style="margin-left: 10px;">認証中...</span>
    </div>

    <div class="zoom-controls">
        <button id="zoom-out">－</button>
        <span id="zoom-percent">100%</span>
        <button id="zoom-in">＋</button>
    </div>

    <div class="pager">
        <button id="prev-btn">前へ</button>
        <span>Page: <span id="page-num">1</span> / <span id="page-count">-</span></span>
        <button id="next-btn">次へ</button>
    </div>
</div>

<div id="pdf-container">
    <canvas id="pdf-render"></canvas>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // --- 設定 ---
    const SUPABASE_URL = 'https://jycqhswoacwoividgozx.supabase.co'; // あなたのURLを記入
    const SUPABASE_KEY = 'sb_publishable_i0inc7RvILsff03SagLiPA_OK_nuxX6'; // あなたのキーを記入
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
    const PDF_URL = './catalog_1.pdf'; 

    let pdfDoc = null, pageNum = 1, isRendering = false;
    let scale = 1.5; // 初期の拡大率
    const canvas = document.getElementById('pdf-render');
    const ctx = canvas.getContext('2d');
    
    const viewerId = document.cookie.match(/viewer_uuid=([^;]+)/)?.[1];

    async function init() {
        if (!viewerId) { window.location.href = 'entry.html'; return; }

        // 【機能：認証失敗時の強制遷移】
        const { data: profile, error } = await supabase.from('profiles').select('*').eq('id', viewerId).single();
        
        // 管理画面で削除された場合、profileがnullになるので追い出す
        if (error || !profile) {
            console.error("Authentication failed: User deleted.");
            window.location.href = 'entry.html';
            return;
        }

        document.getElementById('welcome-msg').textContent = `${profile.company_name} ${profile.full_name} 様`;

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        try {
            pdfDoc = await pdfjsLib.getDocument(PDF_URL).promise;
            document.getElementById('page-count').textContent = pdfDoc.numPages;
            
            const startPage = parseInt(new URLSearchParams(window.location.search).get('page')) || 1;
            pageNum = Math.min(Math.max(startPage, 1), pdfDoc.numPages);
            
            // --- ここで初期ストレッチ表示の倍率を計算 ---
            const firstPage = await pdfDoc.getPage(1);
            const unscaledViewport = firstPage.getViewport({ scale: 1.0 });
            // コンテナの幅（余白40px分を引く）をPDFの本来の幅で割る
            scale = (container.clientWidth - 60) / unscaledViewport.width;
            // ---------------------------------------

            renderPage(pageNum);
            startPresence();
        } catch (e) {
            console.error("PDF Load Error:", e);
            alert("PDFが読み込めません。");
        }
    }

    async function logToDB(p) {
        // 【機能：ログ送信時の認証チェック】
        const { error } = await supabase.from('page_views').insert([{ 
            user_id: viewerId, 
            file_name: PDF_URL.split('/').pop(), 
            current_page: p 
        }]);

        // 送信に失敗（＝ユーザーが消されている）したら追い出し
        if (error) {
            window.location.href = 'entry.html';
        }
    }

    function startPresence() {
        const channel = supabase.channel('online-users');
        const track = () => {
            channel.track({ 
                user_id: viewerId, 
                current_page: pageNum, 
                current_path: PDF_URL.split('/').pop() 
            });
            logToDB(pageNum);
        };
        channel.subscribe(status => { if (status === 'SUBSCRIBED') track(); });
        setInterval(track, 30000); 
        window.forceTrack = track;
    }

    
    let currentRenderTask = null; // 実行中の描画タスクを保持
    function renderPage(num) {
        // 1. 実行中の描画があればキャンセル（重要！）
        if (currentRenderTask) {
            currentRenderTask.cancel();
        }

    isRendering = true;
    pdfDoc.getPage(num).then(page => {
        const viewport = page.getViewport({ scale: scale });

        // 2. Canvasの物理サイズ（解像度）を更新
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        // 3. ブラウザ上の表示サイズも倍率に合わせて更新する（CSSの干渉を防ぐ）
        // これを追加することで、実際に見た目の大きさが変わります
        canvas.style.width = viewport.width + "px";
        canvas.style.height = viewport.height + "px";

        const renderContext = {
            canvasContext: ctx,
            viewport: viewport
        };

        // 4. 描画タスクを開始
        currentRenderTask = page.render(renderContext);

        currentRenderTask.promise.then(() => {
            isRendering = false;
            currentRenderTask = null;
            document.getElementById('page-num').textContent = num;
            // 拡大率表示を更新
            document.getElementById('zoom-percent').textContent = `${Math.round(scale / 1.5 * 100)}%`;
        }).catch(err => {
            if (err.name === 'RenderingCancelledException') {
                console.log("描画がキャンセルされました（次の操作が優先されました）");
            } else {
                console.error("Render error:", err);
            }
            isRendering = false;
        });
    });
}

    // --- ページめくり処理の共通化 ---
    const goNext = () => {
        if (pageNum < pdfDoc.numPages && !isRendering) {
            pageNum++;
            update();
        }
    };
    
    const goPrev = () => {
        if (pageNum > 1 && !isRendering) {
            pageNum--;
            update();
        }
    };
    
    // --- Canvasクリックによるページ遷移機能を追加 ---
    canvas.addEventListener('click', (e) => {
        // Canvas内でのクリック位置を取得
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left; // クリックしたX座標
        const canvasWidth = rect.width;
    
        // 右側30%をクリックしたら次へ、左側30%をクリックしたら前へ
        if (x > canvasWidth * 0.7) {
            goNext();
        } else if (x < canvasWidth * 0.3) {
            goPrev();
        }
    });
    
    // --- 既存のボタンイベントも共通関数に紐付け ---
    document.getElementById('prev-btn').onclick = goPrev;
    document.getElementById('next-btn').onclick = goNext;

    // 【機能：拡大縮小イベント】
    document.getElementById('zoom-in').onclick = () => {
        scale += 0.25;
        renderPage(pageNum);
    };
    document.getElementById('zoom-out').onclick = () => {
        if (scale > 0.5) {
            scale -= 0.25;
            renderPage(pageNum);
        }
    };

    function update() {
        renderPage(pageNum);
        if (window.forceTrack) window.forceTrack();
    }

    init();
</script>
</body>
</html>
