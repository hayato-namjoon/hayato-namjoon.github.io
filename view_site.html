<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>資料閲覧システム</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; }
        body { margin: 0; background: #525659; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* ツールバー */
        .toolbar { background: var(--dark); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 100; }
        .user-badge { font-size: 0.9em; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; color: #ecf0f1; }
        .pager { display: flex; align-items: center; gap: 15px; }
        button { background: var(--primary); border: none; color: white; padding: 8px 18px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: opacity 0.2s; }
        button:disabled { background: #7f8c8d; cursor: not-allowed; }
        button:hover:not(:disabled) { opacity: 0.8; }
        
        /* PDF表示エリア */
        #pdf-container { flex-grow: 1; overflow: auto; display: flex; justify-content: center; padding: 20px; scroll-behavior: smooth; }
        canvas { box-shadow: 0 0 25px rgba(0,0,0,0.4); background: white; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="user-badge" id="welcome-msg">認証中...</div>
    <div class="pager">
        <button id="prev-btn">前へ</button>
        <span style="font-family: monospace;">Page: <span id="page-num">1</span> / <span id="page-count">-</span></span>
        <button id="next-btn">次へ</button>
    </div>
    <div style="width: 100px;"></div>
</div>

<div id="pdf-container">
    <canvas id="pdf-render"></canvas>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // --- 設定 (URLとKeyを自分のものに書き換えてください) ---
    const SUPABASE_URL = 'https://jycqhswoacwoividgozx.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_i0inc7RvILsff03SagLiPA_OK_nuxX6';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
    const PDF_URL = './test_page_check_file.pdf'; 

    // --- 状態管理 ---
    let pdfDoc = null, pageNum = 1, isRendering = false;
    const canvas = document.getElementById('pdf-render');
    const ctx = canvas.getContext('2d');
    
    // UUIDの取得 (URLパラメータ > Cookie)
    const urlParams = new URLSearchParams(window.location.search);
    const viewerId = urlParams.get('id') || getCookie('viewer_uuid');

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }

    // --- 1. 初期化処理 ---
    async function init() {
        if (!viewerId) {
            window.location.href = 'entry.html'; // 登録がなければフォームへ戻す
            return;
        }

        // 顧客情報を取得
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', viewerId).single();
        if (profile) {
            document.getElementById('welcome-msg').textContent = `${profile.company_name} ${profile.full_name} 様`;
        } else {
            // プロファイルが見つからない（不正なID等）場合も再登録へ
            window.location.href = 'entry.html';
            return;
        }

        // PDFライブラリの初期化
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        pdfjsLib.getDocument(PDF_URL).promise.then(doc => {
            pdfDoc = doc;
            document.getElementById('page-count').textContent = doc.numPages;
            renderPage(pageNum);
            
            // リアルタイム通信開始
            startPresence();
            // 初回の閲覧ログをDBに記録
            logToDB(pageNum);
        });
    }

    // --- 2. データベースへのログ送信（履歴用） ---
    async function logToDB(p) {
        await supabase.from('page_views').insert([{
            user_id: viewerId,
            file_name: PDF_URL.split('/').pop(),
            current_page: p
        }]);
    }

    // --- 3. リアルタイム監視 (Presence / Heartbeat) ---
    let channel;
    async function startPresence() {
        channel = supabase.channel('online-users');
        
        const trackStatus = () => {
            // 管理画面で undefined にならないよう、必ず有効な pageNum を送る
            if (!pageNum) return;
            
            channel.track({
                user_id: viewerId,
                current_page: pageNum,
                current_path: PDF_URL.split('/').pop(),
                online_at: new Date().toISOString()
            });
        };

        channel.subscribe(async (status) => {
            if (status === 'SUBSCRIBED') trackStatus();
        });

        // 定期的な「まだ見ています」信号 (30秒おき)
        setInterval(trackStatus, 30000);

        // ページ移動時に即座に通知するためのグローバル関数化
        window.forceTrack = trackStatus;
    }

    // --- 4. PDFレンダリング ---
    function renderPage(num) {
        isRendering = true;
        pdfDoc.getPage(num).then(page => {
            const viewport = page.getViewport({ scale: 1.5 });
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            const renderCtx = { canvasContext: ctx, viewport: viewport };
            page.render(renderCtx).promise.then(() => {
                isRendering = false;
                document.getElementById('page-num').textContent = num;
                // スクロールをトップに戻す
                document.getElementById('pdf-container').scrollTop = 0;
            });
        });
    }

    // --- 5. ボタンイベント ---
    document.getElementById('prev-btn').onclick = () => {
        if (pageNum <= 1 || isRendering) return;
        pageNum--;
        updateView();
    };

    document.getElementById('next-btn').onclick = () => {
        if (pageNum >= pdfDoc.numPages || isRendering) return;
        pageNum++;
        updateView();
    };

    function updateView() {
        renderPage(pageNum);
        logToDB(pageNum);      // DBに履歴を残す
        if (window.forceTrack) window.forceTrack(); // 管理画面に現在のページを即座に送る
    }

    // 起動
    init();
</script>
</body>
</html>
