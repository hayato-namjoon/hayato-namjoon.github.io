<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資料閲覧システム</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { margin: 0; background: #525659; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; overflow: hidden; }
        .toolbar { background: #2c3e50; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 100; }
        .zoom-controls, .page-display { display: flex; align-items: center; gap: 15px; }
        button { background: #3498db; border: none; color: white; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .back-btn { background: #95a5a6; }
        
        #pdf-container {
            flex-grow: 1; 
            overflow: auto; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            background: #525659; 
        }
        canvas { 
            background: white; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: block; 
            cursor: pointer;
            margin: auto; /* 上下中央を維持しつつスクロールを可能にする設定 */
        }
    </style>
</head>
<body>

<div class="toolbar">
    <div>
        <button class="back-btn" onclick="location.href='choice_catalog.html'">← 戻る</button>
    </div>

    <div class="page-display">
        <span>Page: <span id="page-num">1</span> / <span id="page-count">-</span></span>
    </div>
    
    <div class="zoom-controls">
        <button id="zoom-out">－</button>
        <span id="zoom-percent" style="min-width: 50px; text-align: center;">100%</span>
        <button id="zoom-in">＋</button>
    </div>
</div>

<div id="pdf-container">
    <canvas id="pdf-render"></canvas>
</div>


<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // ==========================================
    // 1. 初期設定（※ご自身のキーに必ず書き換えてください）
    // ==========================================
    const SUPABASE_URL = https://jycqhswoacwoividgozx.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_i0inc7RvILsff03SagLiPA_OK_nuxX6'; 
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
    const PDF_URL = './catalog_1.pdf'; 

    // ==========================================
    // 2. 変数定義
    // ==========================================
    let pdfDoc = null, pageNum = 1, isRendering = false, scale = 1.0, currentRenderTask = null;
    const canvas = document.getElementById('pdf-render');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('pdf-container');
    
    // CookieからユーザーID取得
    const viewerId = document.cookie.match(/viewer_uuid=([^;]+)/)?.[1];

    // Presence (リアルタイム通信) 用の変数
    let presenceChannel = null;
    let isPresenceReady = false;

    // ==========================================
    // 3. メイン初期化処理
    // ==========================================
    async function init() {
        if (!viewerId) { window.location.href = 'entry.html'; return; }

        const urlParams = new URLSearchParams(window.location.search);
        const targetPage = parseInt(urlParams.get('page'));

        // ★ 通信チャネルをPDF読み込みより「先」に準備する
        initPresence();

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        try {
            pdfDoc = await pdfjsLib.getDocument(PDF_URL).promise;
            document.getElementById('page-count').textContent = pdfDoc.numPages;
            
            // パラメータでページ指定があれば上書き
            if (targetPage && targetPage > 0 && targetPage <= pdfDoc.numPages) {
                pageNum = targetPage;
            }
            
            // 初回描画（この中で初回送信も実行されます）
            await updateWithReset();
            
        } catch (e) {
            console.error("PDF Load Error:", e);
        }
    }

    // ==========================================
    // 4. PDF 描画・操作ロジック
    // ==========================================
    async function getFitScale(num) {
        if (!container || !pdfDoc) return 1.0;
        const page = await pdfDoc.getPage(num);
        const unscaledViewport = page.getViewport({ scale: 1.0 });
        const availableWidth = container.clientWidth - 40;
        const availableHeight = container.clientHeight - 40;
        const scaleW = availableWidth / unscaledViewport.width;
        const scaleH = availableHeight / unscaledViewport.height;
        return Math.min(scaleW, scaleH);
    }

    async function renderPage(num) {
        if (currentRenderTask) currentRenderTask.cancel();
        isRendering = true;
        try {
            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale: scale });
            
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            canvas.style.width = viewport.width + "px";
            canvas.style.height = viewport.height + "px";
            
            const renderContext = { canvasContext: ctx, viewport: viewport };
            currentRenderTask = page.render(renderContext);
            await currentRenderTask.promise;
            
            // UIの文字を更新
            document.getElementById('page-num').textContent = num;
            document.getElementById('zoom-percent').textContent = `${Math.round(scale * 100)}%`;
        } catch (err) {
            if (err.name !== 'RenderingCancelledException') console.error(err);
        } finally {
            isRendering = false;
            currentRenderTask = null;
        }
    }

    // ページをめくった時の処理
    async function updateWithReset() {
        scale = await getFitScale(pageNum);
        await renderPage(pageNum);
        if (container) container.scrollTo(0, 0);
        
        // ★ ページが変わった瞬間に最新情報を強制送信
        sendPresenceUpdate();
    }

    // ズーム時の処理（ページ送信は不要）
    async function updateKeepZoom() {
        await renderPage(pageNum);
    }

    // 操作ボタン等のイベント
    document.getElementById('zoom-in').onclick = () => { scale *= 1.2; updateKeepZoom(); };
    document.getElementById('zoom-out').onclick = () => { scale /= 1.2; updateKeepZoom(); };

    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        if (x > rect.width * 0.7) { 
            if (pageNum < pdfDoc.numPages && !isRendering) { pageNum++; updateWithReset(); } 
        } else if (x < rect.width * 0.3) { 
            if (pageNum > 1 && !isRendering) { pageNum--; updateWithReset(); } 
        }
    });

    // ==========================================
    // 5. データベースログ・Presence（リアルタイム通信）
    // ==========================================
    async function logToDB(p) {
        if (!viewerId) return;
        await supabase.from('page_views').insert([{ 
            user_id: viewerId, 
            file_name: PDF_URL.split('/').pop(), 
            current_page: p 
        }]);
    }

    function initPresence() {
        presenceChannel = supabase.channel('online-users');

        presenceChannel.subscribe(status => {
            if (status === 'SUBSCRIBED') {
                isPresenceReady = true;
                sendPresenceUpdate(); // 接続完了時に現在の状態を送る
            }
        });

        // 30秒ごとに定期的に「まだ見てるよ」と報告
        setInterval(sendPresenceUpdate, 30000);

        // 別タブに行っていたユーザーが戻ってきた瞬間に報告
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') sendPresenceUpdate();
        });
    }

    async function sendPresenceUpdate() {
        // まだ接続できていない場合は無視
        if (!isPresenceReady || !presenceChannel) return;

        const status = document.visibilityState === 'visible' ? 'online' : 'away';

        try {
            await presenceChannel.track({ 
                user_id: viewerId, 
                current_page: Number(pageNum), // ★ 数値として確実にページを送る
                current_path: PDF_URL.split('/').pop(),
                status: status,
                last_seen: Date.now() // ★ 毎度新しい時刻を送ることで管理画面を更新させる
            });

            // 画面を見ている時だけDBにログを残す
            if (status === 'online') {
                logToDB(pageNum);
            }
        } catch (error) {
            console.error("Presence Track Error:", error);
        }
    }

    // ==========================================
    // 起動
    // ==========================================
    init();
</script>

    // 起動
    init();
</script>
</html>
