<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資料閲覧システム</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { margin: 0; background: #525659; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        .toolbar { background: #2c3e50; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 100; }
        .pager, .zoom-controls { display: flex; align-items: center; gap: 10px; }
        button { background: #3498db; border: none; color: white; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:disabled { background: #7f8c8d; }
        .back-btn { background: #95a5a6; }
        #pdf-container { flex-grow: 1; overflow: auto; display: flex; justify-content: center; padding: 20px; }
        canvas { background: white; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="toolbar">
    <div>
        <button class="back-btn" onclick="location.href='choice_catalog.html'">← カタログ選択へ</button>
        <span id="welcome-msg" style="margin-left: 10px;">認証中...</span>
    </div>
    
    <div class="zoom-controls">
        <button id="zoom-out">－</button>
        <span id="zoom-percent">100%</span>
        <button id="zoom-in">＋</button>
    </div>

    <div class="pager">
        <button id="prev-btn">前へ</button>
        <span>Page: <span id="page-num">1</span> / <span id="page-count">-</span></span>
        <button id="next-btn">次へ</button>
    </div>
</div>

<div id="pdf-container">
    <canvas id="pdf-render"></canvas>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // --- 設定 ---
    const SUPABASE_URL = 'https://jycqhswoacwoividgozx.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_i0inc7RvILsff03SagLiPA_OK_nuxX6';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
    const PDF_URL = './catalog_1.pdf'; 

    let pdfDoc = null;
    let pageNum = 1;
    let scale = 1.5; // 初期の拡大率
    let isRendering = false;
    
    const canvas = document.getElementById('pdf-render');
    const ctx = canvas.getContext('2d');
    
    const viewerId = document.cookie.match(/viewer_uuid=([^;]+)/)?.[1];

    async function init() {
        // 1. Cookieの存在チェック
        if (!viewerId) { 
            console.log("No cookie found.");
            window.location.href = 'entry.html'; 
            return; 
        }

        // 2. データベースとの照合認証
        const { data: profile, error } = await supabase.from('profiles').select('*').eq('id', viewerId).single();
        
        if (error || !profile) { 
            console.error("Auth failed: User not in database.");
            // 認証失敗時にCookieを削除して遷移（任意）
            document.cookie = "viewer_uuid=; max-age=0; path=/"; 
            window.location.href = 'entry.html'; 
            return; 
        }
        
        document.getElementById('welcome-msg').textContent = `${profile.full_name} 様`;

        // PDFの読み込み
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        try {
            pdfDoc = await pdfjsLib.getDocument(PDF_URL).promise;
            document.getElementById('page-count').textContent = pdfDoc.numPages;
            renderPage(pageNum);
            startPresence();
        } catch (e) {
            console.error("PDF Load Error:", e);
        }
    }

    // 描画処理
    function renderPage(num) {
        isRendering = true;
        pdfDoc.getPage(num).then(page => {
            const viewport = page.getViewport({ scale: scale });
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            const renderContext = { canvasContext: ctx, viewport: viewport };
            page.render(renderContext).promise.then(() => {
                isRendering = false;
                document.getElementById('page-num').textContent = num;
                document.getElementById('zoom-percent').textContent = `${Math.round(scale * 100 / 1.5)}%`;
            });
        });
    }

    // 認証維持とログ送信
    async function logToDB(p) {
        const { error } = await supabase.from('page_views').insert([{ 
            user_id: viewerId, 
            file_name: PDF_URL.split('/').pop(), 
            current_page: p 
        }]);

        // ログ送信に失敗した場合（管理者がDBからユーザーを消した場合など）
        if (error) {
            console.error("Log failed. User may have been deleted.");
            window.location.href = 'entry.html';
        }
    }

    function startPresence() {
        const channel = supabase.channel('online-users');
        const track = () => {
            channel.track({ user_id: viewerId, current_page: pageNum, current_path: PDF_URL.split('/').pop() });
            logToDB(pageNum);
        };
        channel.subscribe(status => { if (status === 'SUBSCRIBED') track(); });
        setInterval(track, 30000);
        window.forceTrack = track;
    }

    // イベントリスナー
    document.getElementById('prev-btn').onclick = () => { if (pageNum > 1 && !isRendering) { pageNum--; update(); } };
    document.getElementById('next-btn').onclick = () => { if (pageNum < pdfDoc.numPages && !isRendering) { pageNum++; update(); } };

    // 拡大・縮小
    document.getElementById('zoom-in').onclick = () => {
        scale += 0.25;
        renderPage(pageNum);
    };
    document.getElementById('zoom-out').onclick = () => {
        if (scale > 0.5) {
            scale -= 0.25;
            renderPage(pageNum);
        }
    };

    function update() {
        renderPage(pageNum);
        if (window.forceTrack) window.forceTrack();
    }

    init();
</script>
</body>
</html>
