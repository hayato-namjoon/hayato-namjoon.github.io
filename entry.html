<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>閲覧登録 - 資料ダウンロード</title>
    <style>
        :root { --primary: #3498db; --dark: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .form-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; display: none; }
        h1 { font-size: 1.5rem; color: var(--dark); margin-bottom: 20px; text-align: center; }
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 5px; color: #666; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        button:hover { background: #2980b9; }
        .loading { text-align: center; color: var(--dark); font-weight: bold; }
    </style>
</head>
<body>

<div id="loading-screen" class="loading">認証情報を確認中...</div>

<div class="form-card" id="registration-form">
    <h1>資料閲覧フォーム</h1>
    <p style="font-size: 0.85rem; color: #666; text-align: center; margin-bottom: 20px;">
        ご入力後、すぐにカタログをご覧いただけます。
    </p>
    <form id="lead-form">
        <div class="field">
            <label>メールアドレス</label>
            <input type="email" id="email" required placeholder="example@mail.com">
        </div>
        <div class="field">
            <label>電話番号</label>
            <input type="tel" id="phone" required placeholder="090-0000-0000">
        </div>
        <button type="submit" id="submit-btn">資料を閲覧する</button>
    </form>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // ※必ずご自身のURLとKEYに書き換えてください
    const SUPABASE_URL = 'https://jycqhswoacwoividgozx.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_i0inc7RvILsff03SagLiPA_OK_nuxX6';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const COOKIE_NAME = 'viewer_uuid';

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }

    function setCookie(name, value) {
        const date = new Date();
        date.setFullYear(date.getFullYear() + 1);
        document.cookie = `${name}=${value}; path=/; expires=${date.toUTCString()}; SameSite=Lax`;
    }

    async function init() {
        const uuid = getCookie(COOKIE_NAME);
        if (uuid) {
            window.location.href = `choice_catalog.html`;
        } else {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('registration-form').style.display = 'block';
        }
    }

    document.getElementById('lead-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = "登録中...";

        const newUuid = crypto.randomUUID();
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;

        // --- 会社名予測ロジック（専用辞書テーブルの参照） ---
        let predictedCompany = null;
        let isPredicted = false;

        const domain = email.split('@')[1]?.toLowerCase();
        if (domain) {
            // 1. まず、入力されたドメインがフリーメールでないか確認
            const { data: freeDomainCheck } = await supabase
                .from('free_mail_domains')
                .select('domain')
                .eq('domain', domain)
                .maybeSingle();

            // 2. フリーメールでなければ、専用辞書(company_domains)を検索
            if (!freeDomainCheck) {
                const { data: dictMatch } = await supabase
                    .from('company_domains')
                    .select('company_name')
                    .eq('domain', domain)
                    .single();

                // 辞書に登録されていれば、それを予測結果としてセット
                if (dictMatch && dictMatch.company_name) {
                    predictedCompany = dictMatch.company_name;
                    isPredicted = true;
                }
            }
        }

        // DB（profiles）に登録するデータ
        const profileData = {
            id: newUuid,
            email: email,
            phone: phone
        };
        // 予測できた場合「のみ」データを追加する（予測できなければDBの初期値 '未登録' に任せる）
        if (predictedCompany) {
            profileData.company_name = predictedCompany;
            profileData.is_predicted_company = isPredicted;
        }

        const { error } = await supabase.from('profiles').insert([profileData]);

        if (error) {
            alert("エラーが発生しました: " + error.message);
            btn.disabled = false;
            btn.textContent = "資料を閲覧する";
        } else {
            setCookie(COOKIE_NAME, newUuid);
            window.location.href = 'choice_catalog.html';
        }
    };

    init();
</script>
</body>
</html>
