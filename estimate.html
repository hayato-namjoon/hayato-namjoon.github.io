<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>お見積り作成 - Sales Intelligence</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --primary: #3498db; --secondary: #2ecc71; --dark: #2c3e50; --light: #f4f7f6; --danger: #e74c3c; }
        body { font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .estimate-container { max-width: 950px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: var(--dark); border-bottom: 2px solid var(--primary); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .back-link { font-size: 0.5em; text-decoration: none; color: var(--primary); }
        
        .section { margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 0.9em; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 16px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: var(--dark); color: white; padding: 12px; text-align: left; font-size: 0.9em; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; display: inline-block; }
        .btn-add { background: var(--primary); color: white; margin-top: 10px; }
        .btn-pdf { background: var(--secondary); color: white; width: 100%; font-size: 1.2em; margin-top: 30px; height: 60px; }
        .btn-pdf:disabled { background: #ccc; cursor: not-allowed; }
        .btn-remove { background: var(--danger); color: white; padding: 5px 10px; }
        
        .totals { margin-top: 20px; text-align: right; font-size: 1.1em; background: #f9f9f9; padding: 20px; border-radius: 8px; }
        .totals b { font-size: 1.6em; color: var(--primary); }
        .status-msg { margin-top: 10px; text-align: center; font-weight: bold; }

        /* --- モーダル用のスタイル --- */
        #step2-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; }
        .step2-content { background: white; padding: 30px; border-radius: 10px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .step2-content h2 { margin-top: 0; font-size: 1.3rem; color: #2c3e50; }
        .step2-content p { font-size: 0.9rem; color: #666; margin-bottom: 20px; }
        .step2-field { margin-bottom: 15px; }
        .step2-field label { display: block; font-size: 0.85rem; margin-bottom: 5px; color: #333; font-weight: bold; }
        .step2-field input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; box-sizing: border-box; }
        .step2-btn { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .step2-btn:hover { background: #2980b9; }
        .predict-notice { font-size: 0.75rem; color: #2ecc71; margin-top: 5px; display: none; font-weight: bold; }
    </style>
</head>
<body>

<!-- 二段階登録用モーダル -->
<div id="step2-modal">
    <div class="step2-content">
        <h2>お見積りの作成へ進む</h2>
        <p>見積書に記載するお客様情報を入力してください。</p>
        <form id="step2-form" onsubmit="submitStep2(event)">
            <div class="step2-field">
                <label>会社名</label>
                <input type="text" id="step2_company" required placeholder="株式会社〇〇">
                <div id="predict-notice" class="predict-notice"></div>
            </div>
            <div class="step2-field">
                <label>部署名</label>
                <input type="text" id="step2_department" placeholder="営業部 (任意)">
            </div>
            <div class="step2-field">
                <label>お名前</label>
                <input type="text" id="step2_name" required placeholder="山田 太郎">
            </div>
            <button type="submit" id="step2-submit" class="step2-btn">見積もりを作成する</button>
        </form>
    </div>
</div>

<div class="estimate-container">
    <h1>
        お見積り作成
        <a href="choice_catalog.html" class="back-link">← カタログ選択に戻る</a>
    </h1>
    
    <div class="section grid">
        <div>
            <label>貴社名 (必須)</label>
            <input type="text" id="customer-company" placeholder="株式会社〇〇">
        </div>
        <div>
            <label>件名</label>
            <input type="text" id="estimate-title" value="製品導入のご検討に関するお見積り">
        </div>
    </div>

    <div class="section">
        <table id="item-table">
            <thead>
                <tr>
                    <th style="width: 45%;">商品名 / 型番</th>
                    <th style="width: 20%;">単価 (税別)</th>
                    <th style="width: 10%;">数量</th>
                    <th style="width: 20%;">小計</th>
                    <th style="width: 5%;"></th>
                </tr>
            </thead>
            <tbody id="item-tbody"></tbody>
        </table>
        <button class="btn btn-add" onclick="addRow()">+ 行を追加</button>
    </div>

    <div class="totals">
        <div>小計: ¥<span id="subtotal">0</span></div>
        <div>消費税 (10%): ¥<span id="tax">0</span></div>
        <div style="margin-top: 10px;">合計金額: <b>¥<span id="total">0</span></b></div>
    </div>

    <button id="submit-btn" class="btn btn-pdf" onclick="processEstimate()">
        PDF見積書を発行 ＆ データを保存
    </button>
    <div id="status-msg" class="status-msg"></div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // --- 設定：各自の環境に合わせて書き換えてください ---
    const SUPABASE_URL = 'https://jycqhswoacwoividgozx.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_i0inc7RvILsff03SagLiPA_OK_nuxX6';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const productMaster = [
        { id: 'f7', name: "Flex-7 (産業用6軸アーム)", code: "NR-F7", price: 3800000 },
        { id: 'pro', name: "Pro-Infinity (超精密6軸アーム)", code: "NR-P-INF", price: 5200000 },
        { id: 'h-g5', name: "XS用チャック (NR-H-G5)", code: "NR-H-G5", price: 158000 },
        { id: 'cam', name: "3Dビジョンセンサ", code: "NR-Cam-S", price: 298000 },
        { id: 'pace', name: "Nano-Pace 3 (ペースメーカー)", code: "AM-PM-SYNC", price: 1200000 },
        { id: 'ecg', name: "Heart-View Pro (12誘導心電計)", code: "AM-ECG-12", price: 850000 }
    ];

    const JP_FONT_VFS = ""; // 日本語フォントBase64文字列
    const viewerId = document.cookie.match(/viewer_uuid=([^;]+)/)?.[1];

    async function init() {
        if (!viewerId) { window.location.href = 'entry.html'; return; }
        
        // 1. 未登録情報の入力チェックと予測の確定を行う
        await checkAndPromptStep2();
        
        // 2. 問題なければ機能とトラッキングを開始
        startPresence();
        addRow(); 
    }

    // --- 会社名確定 ＆ 二段階登録ロジック ---
    async function checkAndPromptStep2() {
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', viewerId).single();
        
        // 会社名が登録されていて、かつ「予測（仮）」でなければ、そのまま見積画面へ
        if (profile && profile.company_name && profile.company_name !== '未登録' && profile.is_predicted_company === false) {
            document.getElementById('customer-company').value = profile.company_name;
            return;
        }

        // 会社名が '未登録'、または「予測（仮）」の場合はモーダルを表示
        document.getElementById('step2-modal').style.display = 'flex';

        // entry.htmlで予測された会社名がDBにあれば（未登録という文字以外なら）、初期値としてセットしておく
        if (profile && profile.is_predicted_company && profile.company_name !== '未登録') {
            document.getElementById('step2_company').value = profile.company_name;
            document.getElementById('predict-notice').style.display = 'block'; 
            document.getElementById('predict-notice').textContent = "✨ メールアドレスから会社名を自動入力しました。正しければそのままお進みください。";
        }
    }

    // モーダルからの送信処理（グローバル関数化）
    window.submitStep2 = async function(e) {
        e.preventDefault();
        const btn = document.getElementById('step2-submit');
        btn.disabled = true;
        btn.textContent = "保存中...";

        const company = document.getElementById('step2_company').value;
        const updateData = {
            company_name: company,
            department: document.getElementById('step2_department').value,
            full_name: document.getElementById('step2_name').value,
            is_predicted_company: false // ユーザーが確定させたので予測フラグを解除
        };

        // 既存のレコードに情報を上書き(UPDATE)
        const { error } = await supabase.from('profiles').update(updateData).eq('id', viewerId);

        if (error) {
            alert("エラーが発生しました: " + error.message);
            btn.disabled = false;
            btn.textContent = "見積もりを作成する";
        } else {
            document.getElementById('step2-modal').style.display = 'none';
            document.getElementById('customer-company').value = company;

            // --- 辞書の自動学習ロジック ---
            const { data: profile } = await supabase.from('profiles').select('email').eq('id', viewerId).single();
            if (profile && profile.email) {
                const domain = profile.email.split('@')[1];
                
                // フリーメールかチェック
                const { data: freeCheck } = await supabase.from('free_mail_domains').select('domain').eq('domain', domain).single();
                
                if (!freeCheck) {
                    // 専用辞書に upsert (なければ追加、あれば更新) する
                    await supabase.from('company_domains').upsert([
                        { domain: domain, company_name: company }
                    ], { onConflict: 'domain' });
                }
            }
        }
    };

    // --- リアルタイム追跡（管理画面への通知用） ---
    function startPresence() {
        const channel = supabase.channel('online-users');
        const track = () => {
            channel.track({ 
                user_id: viewerId, 
                current_path: 'estimate.html',
                current_page: 0, 
                status: document.visibilityState === 'visible' ? 'online' : 'away',
                last_seen: Date.now()
            });
        };
        channel.subscribe(status => { if (status === 'SUBSCRIBED') track(); });
        setInterval(track, 30000);
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') track();
        });
    }

    // --- フォーム操作ロジック ---
    window.addRow = function() {
        const tbody = document.getElementById('item-tbody');
        const tr = document.createElement('tr');
        let options = productMaster.map(p => 
            `<option value="${p.price}" data-id="${p.id}">${p.name} (${p.code})</option>`
        ).join('');
        
        tr.innerHTML = `
            <td>
                <select onchange="updatePrice(this)" class="product-select">
                    <option value="0">商品を選択してください</option>
                    ${options}
                    <option value="custom">直接入力（カスタム）</option>
                </select>
            </td>
            <td><input type="number" class="price" value="0" oninput="calculate()"></td>
            <td><input type="number" class="qty" value="1" min="1" oninput="calculate()"></td>
            <td class="row-total" style="font-weight:bold;">¥0</td>
            <td><button class="btn btn-remove" onclick="this.parentElement.parentElement.remove(); calculate();">×</button></td>
        `;
        tbody.appendChild(tr);
    };

    window.updatePrice = function(select) {
        const row = select.parentElement.parentElement;
        const priceInput = row.querySelector('.price');
        if (select.value !== "custom") {
            priceInput.value = select.value;
            priceInput.readOnly = true;
        } else {
            priceInput.value = 0;
            priceInput.readOnly = false;
        }
        calculate();
    };

    window.calculate = function() {
        let subtotal = 0;
        document.querySelectorAll('#item-tbody tr').forEach(tr => {
            const price = parseFloat(tr.querySelector('.price').value) || 0;
            const qty = parseFloat(tr.querySelector('.qty').value) || 0;
            const rowTotal = price * qty;
            tr.querySelector('.row-total').textContent = '¥' + rowTotal.toLocaleString();
            subtotal += rowTotal;
        });
        const tax = Math.floor(subtotal * 0.1);
        const total = subtotal + tax;
        document.getElementById('subtotal').textContent = subtotal.toLocaleString();
        document.getElementById('tax').textContent = tax.toLocaleString();
        document.getElementById('total').textContent = total.toLocaleString();
    };

    // --- 保存 ＆ PDF生成 ---
    window.processEstimate = async function() {
        const company = document.getElementById('customer-company').value;
        const title = document.getElementById('estimate-title').value;
        if (!company) { alert("貴社名を入力してください"); return; }

        const btn = document.getElementById('submit-btn');
        const msg = document.getElementById('status-msg');
        btn.disabled = true;
        msg.textContent = "データを保存中...";

        try {
            const subtotal = parseInt(document.getElementById('subtotal').textContent.replace(/,/g, ''));
            const tax = parseInt(document.getElementById('tax').textContent.replace(/,/g, ''));
            const total = parseInt(document.getElementById('total').textContent.replace(/,/g, ''));

            // 1. メイン保存
            const { data: estData, error: estErr } = await supabase.from('estimates').insert([{ 
                viewer_id: viewerId, title: title, customer_company: company,
                subtotal_price: subtotal, tax_amount: tax, total_price: total
            }]).select();
            if (estErr) throw estErr;

            // 2. 明細保存
            const estimateId = estData[0].id;
            const items = [];
            document.querySelectorAll('#item-tbody tr').forEach(tr => {
                const select = tr.querySelector('.product-select');
                const price = parseInt(tr.querySelector('.price').value);
                const qty = parseInt(tr.querySelector('.qty').value);
                items.push({
                    estimate_id: estimateId,
                    product_name_snap: select.options[select.selectedIndex].text,
                    unit_price: price, quantity: qty, row_total: price * qty
                });
            });
            const { error: itemErr } = await supabase.from('estimate_items').insert(items);
            if (itemErr) throw itemErr;

            msg.style.color = "green";
            msg.textContent = "保存完了！PDFを生成します...";

            // 3. PDF生成
            generatePDF(company, title, items, total);

        } catch (err) {
            console.error(err);
            alert("エラーが発生しました: " + err.message);
        } finally {
            btn.disabled = false;
        }
    };

    function generatePDF(company, title, items, total) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        if (JP_FONT_VFS) {
            doc.addFileToVFS("Japanese.ttf", JP_FONT_VFS);
            doc.addFont("Japanese.ttf", "Japanese", "normal");
            doc.setFont("Japanese");
        }

        doc.setFontSize(20);
        doc.text("御 見 積 書", 105, 20, { align: "center" });
        doc.setFontSize(12);
        doc.text(`宛先: ${company} 御中`, 20, 40);
        doc.text(`件名: ${title}`, 20, 50);
        doc.text(`発行日: ${new Date().toLocaleDateString()}`, 150, 40);
        doc.setFontSize(16);
        doc.text(`合計金額: ￥${total.toLocaleString()} (税込)`, 20, 70);

        const tableBody = items.map(i => [i.product_name_snap, `¥${i.unit_price.toLocaleString()}`, i.quantity, `¥${i.row_total.toLocaleString()}`]);
        doc.autoTable({
            startY: 80,
            head: [['品名/型番', '単価', '数量', '金額']],
            body: tableBody,
            headStyles: { fillColor: [44, 62, 80] },
            styles: { font: JP_FONT_VFS ? "Japanese" : "helvetica" }
        });

        doc.save(`見積書_${company}.pdf`);
    }

    init();
</script>
</body>
</html>
