<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資料ポータル</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f7f6; }
        .menu-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 600px; }
        .card { background: white; padding: 40px; border-radius: 12px; text-decoration: none; color: #333; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card h2 { color: #3498db; margin-top: 0; }
        .card p { font-size: 0.9em; color: #666; }
    </style>
</head>
<body>

<div class="menu-container">
    <a href="entry.html" class="card">
        <h2>資料を閲覧する</h2>
        <p>最新の製品カタログ・価格表はこちらからご覧いただけます。</p>
    </a>

    <a href="admin.html" class="card">
        <h2>管理者パネル</h2>
        <p>リアルタイムの閲覧状況と顧客分析を確認します。</p>
    </a>
</div>

</body>
</html>
